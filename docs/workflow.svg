<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="auto">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>

    <!-- Glowing Accents -->
    <linearGradient id="glowAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Node Gradient (Glass) -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <!-- Filters -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="400" rx="24" fill="url(#bg)" />
  
  <!-- Subtle Grid Overlay -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <path d="M 0 50 L 1000 50 M 0 100 L 1000 100 M 0 150 L 1000 150 M 0 200 L 1000 200 M 0 250 L 1000 250 M 0 300 L 1000 300 M 0 350 L 1000 350" />
    <path d="M 100 0 L 100 400 M 200 0 L 200 400 M 300 0 L 300 400 M 400 0 L 400 400 M 500 0 L 500 400 M 600 0 L 600 400 M 700 0 L 700 400 M 800 0 L 800 400 M 900 0 L 900 400" />
  </g>

  <!-- Title / Branding -->
  <text x="50" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#ffffff" letter-spacing="2">NeuroLoom</text>
  <rect x="180" y="38" width="80" height="15" rx="7.5" fill="url(#glowAccent)" opacity="0.8"/>
  <text x="220" y="49" font-family="system-ui" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">WORKFLOW</text>

  <!-- Connective Paths -->
  <!-- Main flow paths with glowing animation dots -->
  <path d="M 280 200 Q 350 200 350 200" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M 650 200 Q 720 200 720 200" fill="none" stroke="url(#glowAccent)" stroke-width="3" filter="url(#neonGlow)" />
  
  <circle cx="315" cy="200" r="3" fill="#ffffff" />
  <circle cx="685" cy="200" r="4" fill="#ffffff" filter="url(#neonGlow)" />

  <g font-family="system-ui, -apple-system, sans-serif">
    
    <!-- Stage 1: Runtime/Export -->
    <g transform="translate(60, 100)">
      <rect width="220" height="200" rx="20" fill="url(#glass)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#glassShadow)"/>
      <rect width="220" height="4" fill="url(#glowAccent)" opacity="0.6" style="mix-blend-mode: overlay;" />
      
      <circle cx="110" cy="80" r="40" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.5)" stroke-width="2" />
      <path d="M95 70 L125 70 L110 95 Z" fill="rgba(59,130,246,0.8)" />
      
      <text x="110" y="150" text-anchor="middle" font-size="16" font-weight="600" fill="#f8fafc">Model Training</text>
      <text x="110" y="170" text-anchor="middle" font-size="12" fill="#94a3b8">PyTorch / Export ONNX</text>
    </g>

    <!-- Stage 2: Loomtrace Engine -->
    <g transform="translate(350, 100)">
      <rect width="280" height="200" rx="20" fill="url(#glass)" stroke="rgba(255,255,255,0.15)" stroke-width="1" filter="url(#glassShadow)"/>
      
      <!-- Internal Nodes representing MLP/CNN -->
      <g transform="translate(60, 60)">
        <circle cx="0" cy="-20" r="8" fill="#ec4899" filter="url(#neonGlow)"/>
        <circle cx="0" cy="20" r="8" fill="#ec4899" filter="url(#neonGlow)"/>
        <circle cx="60" cy="-30" r="8" fill="#8b5cf6" filter="url(#neonGlow)"/>
        <circle cx="60" cy="0" r="8" fill="#8b5cf6" filter="url(#neonGlow)"/>
        <circle cx="60" cy="30" r="8" fill="#8b5cf6" filter="url(#neonGlow)"/>
        <circle cx="120" cy="0" r="8" fill="#3b82f6" filter="url(#neonGlow)"/>
        
        <path d="M 8 -20 L 52 -30 M 8 -20 L 52 0 M 8 -20 L 52 30" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
        <path d="M 8 20 L 52 -30 M 8 20 L 52 0 M 8 20 L 52 30" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
        <path d="M 68 -30 L 112 0 M 68 0 L 112 0 M 68 30 L 112 0" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
      </g>
      
      <text x="140" y="150" text-anchor="middle" font-size="16" font-weight="600" fill="#f8fafc">.loomtrace Engine</text>
      <text x="140" y="170" text-anchor="middle" font-size="12" fill="#94a3b8">Deterministic Topology &amp; Timeline</text>
    </g>

    <!-- Stage 3: Studio / R3F -->
    <g transform="translate(700, 100)">
      <rect width="240" height="200" rx="20" fill="url(#glass)" stroke="url(#glowAccent)" stroke-width="1" filter="url(#glassShadow)"/>
      
      <!-- 3D Layer Representation -->
      <g transform="translate(120, 80) scale(1.2)">
        <polygon points="0,-25 40,-10 0,15 -40,-10" fill="rgba(139, 92, 246, 0.2)" stroke="#8b5cf6" stroke-width="1.5" />
        <polygon points="0,-15 35,-2 0,20 -35,-2" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1.5" transform="translate(0, 15)" />
        <polygon points="0,-5 30,5 0,25 -30,5" fill="rgba(236, 72, 153, 0.2)" stroke="#ec4899" stroke-width="1.5" filter="url(#neonGlow)" transform="translate(0, 30)" />
      </g>
      
      <text x="120" y="150" text-anchor="middle" font-size="16" font-weight="600" fill="#f8fafc">2.5D Cinematic Studio</text>
      <text x="120" y="170" text-anchor="middle" font-size="12" fill="#94a3b8">WebGPU / React Three Fiber</text>
    </g>
  </g>
  
  <!-- Additional Tech Badges -->
  <g transform="translate(740, 340)">
    <rect width="70" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="35" y="16" font-family="system-ui" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">Three.js</text>
  </g>
  <g transform="translate(820, 340)">
    <rect width="70" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="35" y="16" font-family="system-ui" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">WebGL</text>
  </g>
</svg>